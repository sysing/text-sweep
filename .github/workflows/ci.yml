name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: macos-14
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Build core library
        run: swift build

      - name: Run tests
        run: swift test --parallel

      - name: Ensure no uncommitted changes
        run: git diff --exit-code
